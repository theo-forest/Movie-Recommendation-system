version: '3.8'

services:

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models   # persist trained models
    environment:
      - ENV=production
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8501:8501"
    environment:
      - ENV=production
    depends_on:
      - api
    command: ["streamlit", "run", "app/streamlit_app.py",
              "--server.port=8501", "--server.address=0.0.0.0",
              "--server.headless=true"]

networks:
  default:
    driver: bridge
